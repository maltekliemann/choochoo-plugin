# choochoo-plugins build configuration
# Defines per-backend metadata headers, placeholder values, and output paths.
# Used by generate.py to transform source/ into backend-specific output.

[plugin]
name = "choochoo"
version = "0.3.1"
description = "Autonomous coding using the Ralph Wiggum technique - simple loops, persistent memory, one task at a time"
author_name = "Malte Kliemann"
author_url = "https://github.com/maltekliemann"
repository = "https://github.com/maltekliemann/choochoo"
keywords = ["autonomous", "coding", "ralph", "beads", "workflow"]

# ─── Backend: Claude ─────────────────────────────────────────────────────────

[claude]

[claude.headers.install]
type = "skill"
name = "install"
description = "Install choochoo into the current project"

[claude.headers.spec]
type = "skill"
name = "spec"
description = "Generate or refine a spec file for choochoo from your plan"

[claude.headers.pour]
type = "skill"
name = "pour"
description = "Create Ralph beads from ready tasks in a spec file or conversation context"

[claude.placeholders]
BACKEND_CHECK = """
2. **Check Claude CLI**: Run `claude --version`
   - If not installed: Warn user they'll need it to run Ralph
"""
RUNNER_INSTALL = """   - First check if already installed: `choochoo --help`
   - If not installed, install from PyPI: `pip install choochoo`
   - If `pip` is not available, try `pip3`
   - If pip refuses due to system package protection, use `pip install --user choochoo`
   - If install fails, show the error and suggest the user check their Python environment
"""
FORMULA_COPY = """   ```
   mkdir -p .beads/formulas
   cp "${CLAUDE_PLUGIN_ROOT}"/formulas/*.formula.toml .beads/formulas/
   ```
"""
ASK_USER = "AskUserQuestion"

[claude.placeholders.INVOKE]
install = "/choochoo:install"
spec = "/choochoo:spec"
pour = "/choochoo:pour"


# ─── Backend: Cursor ─────────────────────────────────────────────────────────

[cursor]
# Everything is a skill in .cursor/skills/{name}/SKILL.md
# References are co-located in skill directories

[cursor.headers.install]
type = "skill"
name = "install"
description = "Install choochoo into the current project"
disable-model-invocation = true

[cursor.headers.spec]
type = "skill"
name = "spec"
description = "Generate or refine a spec file for choochoo from your plan"
disable-model-invocation = true

[cursor.headers.pour]
type = "skill"
name = "pour"
description = "Create Ralph beads from ready tasks in a spec file or conversation context"
disable-model-invocation = true

[cursor.placeholders]
BACKEND_CHECK = """
2. **Check Cursor**: Verify you are running in Cursor
   - If not in Cursor: Warn user they'll need it to run Ralph
"""
RUNNER_INSTALL = """   ```bash
   pip install runner/
   ```
   - This installs the `choochoo` CLI from the runner/ directory
   - If `pip` is not available, try `pip3`
   - If install fails, show the error and suggest the user check their Python environment
"""
FORMULA_COPY = """   ```bash
   mkdir -p .beads/formulas
   cp .cursor/skills/install/formulas/*.formula.toml .beads/formulas/
   ```
"""
ASK_USER = "AskUserQuestion"

[cursor.placeholders.INVOKE]
install = "the install skill"
spec = "the spec skill"
pour = "the pour skill"


# ─── Backend: Codex ──────────────────────────────────────────────────────────

[codex]
# Skills go to codex/skills/choochoo-codex-{name}/SKILL.md
# Skill prefix for naming
skill_prefix = "choochoo-codex-"

[codex.headers.install]
type = "skill"
name = "choochoo-codex-install"
description = "Install and initialize choochoo in a repository for Codex-driven workflows. Use when asked to set up prerequisites, formulas, or project bootstrap."

[codex.headers.spec]
type = "skill"
name = "choochoo-codex-spec"
description = "Generate or refine choochoo spec files from plans or conversation context. Use when asked to create, revise, or review .choochoo/*.spec.md."

[codex.headers.pour]
type = "skill"
name = "choochoo-codex-pour"
description = "Convert ready choochoo spec tasks into beads using formulas or singular tasks. Use when asked to pour specs into executable Ralph work."

[codex.placeholders]
BACKEND_CHECK = ""
RUNNER_INSTALL = """   ```bash
   if ! command -v choochoo >/dev/null 2>&1; then
     if [ -d ./runner ]; then
       pip install ./runner
     elif [ -n "${CHOOCHOO_RUNNER_PATH:-}" ]; then
       pip install "${CHOOCHOO_RUNNER_PATH}"
     else
       echo "choochoo CLI not found and no runner path available"
     fi
   fi
   ```
   - If install fails, ask user for a runner source path and retry with `pip install <path>`
"""
FORMULA_COPY = """   ```bash
   mkdir -p .beads/formulas
   ```
   Copy all bundled formula files:
   ```bash
   FORMULA_DIR="$(find "${CODEX_HOME:-$HOME/.codex}/skills/choochoo-codex-install" -type d -name 'assets' | head -n1)"
   cp "${FORMULA_DIR}"/*.formula.toml .beads/formulas/
   ```
"""
ASK_USER = "Ask user"

[codex.placeholders.INVOKE]
install = "the install skill"
spec = "the spec skill"
pour = "the pour skill"


