formula = "choochoo"
# NOTE: We intentionally use 'task' instead of 'desc' because beads replaces
# the root description with {{desc}} if a 'desc' variable is defined.
# By using 'task', we keep control of the full orchestrator prompt.
description = """
# Task: {{title}}

You are implementing this task. The runner has injected full task context,
step descriptions, and previous state into your prompt. Do NOT run `bd`
commands for task discovery or lifecycle management.

## Task
**Category:** {{category}}

{{task}}

## Workflow

1. Read the task context and state.md provided in your prompt
2. Implement the changes
3. Self-verify (run tests, type checks, lint)
4. Write the result JSON file to the configured path
5. Update `.choochoo/state.md` with anything you learned
6. Exit

You may exit early if the task is already complete — write the result
file with `outcome: "done"` and an empty `files_changed` list.

## Constraints

- Do NOT run `bd` commands — the runner handles beads lifecycle
- Do NOT run `git add` or `git commit` — the runner handles git
- Focus exclusively on implementation, testing, and self-verification
- Complete this task, then exit. Do NOT look for another task.

If the task cannot be completed (blocker, missing dependency, etc.),
write the result file with `outcome: "blocked"` and explain in `notes`.
"""
version = 2
type = "workflow"
# NOTE: Root assignee set via --assignee flag during pour, not here

# 'title' is a magic variable that gets substituted into the root's title
# 'task' is our own variable for the task description (avoiding 'desc' which triggers replacement)
[vars.title]
description = "Short title for the task"
required = true

[vars.task]
description = "Detailed description of what needs to be implemented"
required = true

[vars.category]
description = "Task category: functional, style, infrastructure, or documentation"
required = false
default = "functional"

[vars.auto_discovery]
description = "Auto-create tasks for discovered gaps"
default = "false"

[vars.auto_learnings]
description = "Auto-create/update skills for learnings"
default = "false"

# --------------------------------------------------------------------------
# Steps
#
# In runner v2, the runner launches ONE agent per iteration with all step
# descriptions inlined in the prompt (via StepInstructionsSection). These
# steps are NOT separate sub-agent executions — they are guidance sections
# the agent follows sequentially within a single session.
#
# The runner handles: health checks (pre-flight), git commits, beads
# lifecycle. The agent handles: read context, implement, self-verify, report.
# --------------------------------------------------------------------------

[[steps]]
id = "bearings"
title = "Get bearings for {{title}}"
assignee = "ralph-subagent-bearings"
labels = ["ralph-step", "bearings"]
description = """
# BEARINGS

Read the task context and state.md provided by the runner. Identify the
relevant files and understand existing patterns before making changes.

The runner has already verified codebase health (pre-flight checks).
You do not need to run health checks yourself.
"""

[[steps]]
id = "implement"
title = "Implement {{title}}"
assignee = "ralph-subagent-implement"
labels = ["ralph-step", "implement"]
needs = ["bearings"]
description = """
# IMPLEMENTATION

Make the code changes to implement the task.

- Follow existing patterns and conventions
- Keep changes minimal — don't refactor unrelated code
- Add necessary tests if the codebase has them
- Use Edit tool for modifications (not Write for existing files)
"""

[[steps]]
id = "verify"
title = "Verify {{title}}"
assignee = "ralph-subagent-verify"
labels = ["ralph-step", "verify"]
needs = ["implement"]
description = """
# VERIFICATION

Self-verify before writing the result file.

1. Run the test suite
2. Run type checking if available
3. Run linting if available

If trivial issues (typo, missing import): fix inline and re-verify.
If substantial issues: note failures in the result file. The runner
will handle retries with error context.
"""

[[steps]]
id = "gap-review"
title = "Review and pour discovered gaps"
assignee = "ralph-inline-gap-review"
labels = ["ralph-step", "gap-review"]
needs = ["verify"]
condition = "{{auto_discovery}}"
description = """
# GAP REVIEW

Review [GAP] notes from the result file and create new tasks.

1. Check result file notes for `[GAP]` entries
2. For each gap: check if existing open tasks cover it
3. If not covered, pour a new formula:
   ```bash
   bd --no-daemon mol pour choochoo \
     --var title="<gap title>" \
     --var task="<gap description>" \
     --var category="infrastructure" \
     --var auto_discovery="true" \
     --assignee ralph
   ```
"""

[[steps]]
id = "learning-capture"
title = "Capture learnings as skills"
assignee = "ralph-inline-learning-capture"
labels = ["ralph-step", "learning-capture"]
needs = ["verify"]
condition = "{{auto_learnings}}"
description = """
# LEARNING CAPTURE

Review [LEARNING] notes from the result file and create/update skills.

1. Check result file notes for `[LEARNING]` entries
2. For each learning:
   - Search existing skills in `.claude/skills/`
   - If matching skill exists: update it
   - If no match and substantial: create new skill
   - If minor/folder-specific: create folder CLAUDE.md

Prefer: skill > folder CLAUDE.md > root CLAUDE.md (rarely)
"""
